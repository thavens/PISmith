# Accelerate configuration for multi-GPU GRPO training
# GPU layout: GPU 0 = vLLM target server, GPU 1 = training
# Usage: CUDA_VISIBLE_DEVICES=1 accelerate launch --config_file configs/accelerate.yaml ...

compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
downcast_bf16: "no"
enable_cpu_affinity: false
main_training_function: main
mixed_precision: bf16
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
